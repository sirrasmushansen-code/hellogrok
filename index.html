<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First AI Website - Hello Grok!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui; }
        .chat-bubble { max-width: 80%; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-8">
    <div class="max-w-2xl w-full">
        <h1 class="text-5xl font-bold mb-2 text-center">Hello World! 👋</h1>
        <p class="text-xl text-center text-gray-400 mb-8">My first website in 20 years — powered by Grok & GitHub</p>
        
        <!-- Grok Chat Section -->
        <div class="bg-gray-800 rounded-2xl p-6 shadow-xl">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
                💬 Chat with Grok
            </h2>
            
            <div id="chat" class="h-96 overflow-y-auto mb-4 space-y-4 pr-2"></div>
            
            <div class="flex gap-2">
                <input id="userInput" 
                       type="text" 
                       placeholder="Ask Grok anything..." 
                       class="flex-1 bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                <button onclick="sendMessage()" 
                        class="bg-blue-600 hover:bg-blue-700 px-8 rounded-xl font-medium">
                    Send
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-3 text-center">
                Your xAI API key stays in your browser (for demo only)
            </p>
        </div>
        
        <p class="text-center text-gray-500 mt-8 text-sm">
            Deployed with ❤️ using Grok + GitHub Pages
        </p>
    </div>

    <script>
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('userInput');

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `chat-bubble p-4 rounded-2xl ${isUser ? 'ml-auto bg-blue-600' : 'mr-auto bg-gray-700'}`;
            msg.textContent = text;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            input.value = '';

            const apiKey = prompt("Enter your xAI API key (get it at console.x.ai):");
            if (!apiKey) return;

            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "grok-4.3",
                        messages: [
                            { role: "system", content: "You are Grok, helpful and fun." },
                            { role: "user", content: message }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMessage(reply, false);
            } catch (e) {
                addMessage("Error connecting to Grok. Check your API key.", false);
            }
        }

        // Welcome message
        addMessage("Hi! I'm Grok. Ask me anything on this page!", false);
    </script>
</body>
</html>
